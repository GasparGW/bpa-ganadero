name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  app:
    name: Cliente (typecheck + scoring golden)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: app/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm test

  db:
    name: Servidor (scoring SQL + RLS multi-tenant)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Scoring SQL vs golden cases
        run: bash scripts/verify_sql_scoring.sh
      - name: Aislamiento RLS multi-tenant
        run: bash scripts/verify_rls.sh
